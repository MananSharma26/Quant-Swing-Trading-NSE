name: Daily Paper Trader

on:
  schedule:
    # 9:45 AM UTC = 3:15 PM IST. Runs Mon-Fri after market close.
    - cron: '45 9 * * 1-5'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  run-trader:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance python-dotenv pydantic pydantic-settings numpy sqlalchemy psycopg[binary] pyyaml kiteconnect pyarrow statsmodels
          pip install -e . || true

      - name: Run Master Risk Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/run_master_trader.py
